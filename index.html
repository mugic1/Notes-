<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hidden Space Fixer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input[type="file"] {
            margin: 20px 0;
            display: block;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Fix Hidden Spaces (\u00A0)</h2>
    <p>Apni Kotlin/Text file upload karein:</p>
    <input type="file" id="fileInput" accept=".kt,.txt,.java">
    <button onclick="processFile()">Fix & Download</button>
</div>

<script>
function processFile() {
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) {
        alert('Please select a file first!');
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const originalText = e.target.result;
        
        // Yeh line saare hidden non-breaking spaces ko normal space se replace karegi
        const cleanedText = originalText.replace(/\u00A0/g, ' ');

        // Nayi file download karne ka logic
        const blob = new Blob([cleanedText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const downloadLink = document.createElement('a');
        
        downloadLink.href = url;
        downloadLink.download = 'fixed_' + file.name;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        
        // Cleanup
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(url);
    };

    reader.readAsText(file);
}
</script>

</body>
</html>
