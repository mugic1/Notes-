<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple Hidden Space Fixer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input[type="file"] {
            margin: 20px 0;
            display: block;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Fix Hidden Spaces (\u00A0) - Multiple Files</h2>
    <p>Apni Kotlin/Text files ek saath select karein:</p>
    <input type="file" id="fileInput" accept=".kt,.txt,.java" multiple>
    <button onclick="processFiles()">Fix & Download All</button>
</div>

<script>
function processFiles() {
    const fileInput = document.getElementById('fileInput');
    if (fileInput.files.length === 0) {
        alert('Please select at least one file!');
        return;
    }

    // Saari selected files par loop chalega
    Array.from(fileInput.files).forEach(file => {
        const reader = new FileReader();

        reader.onload = function(e) {
            const originalText = e.target.result;
            
            // Hidden non-breaking spaces ko normal space se replace kiya
            const cleanedText = originalText.replace(/\u00A0/g, ' ');

            // Nayi fixed file download karne ka logic
            const blob = new Blob([cleanedText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement('a');
            
            downloadLink.href = url;
            downloadLink.download = 'fixed_' + file.name;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            
            // Cleanup
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        };

        reader.readAsText(file);
    });
}
</script>

</body>
</html>
